name: Release Candidate

on:
  push:
    branches: [master, main]
  workflow_dispatch:
    # Manual dispatch lets you override the default universal macOS build with
    # an arch-specific one. Push builds always produce a universal binary.
    inputs:
      macos_target:
        description: "macOS target arch"
        required: false
        default: universal
        type: choice
        options:
          - universal
          - aarch64
          - x86_64

permissions:
  contents: write

jobs:
  # ── Windows ────────────────────────────────────────────────────────────────
  build-windows:
    runs-on: windows-latest
    outputs:
      version: ${{ steps.meta.outputs.version }}

    steps:
      - uses: actions/checkout@v4

      - name: Extract version
        id: meta
        shell: bash
        run: |
          VERSION=$(grep '^version' apps/desktop-tauri/src-tauri/Cargo.toml \
            | head -1 | sed 's/version = "\(.*\)"/\1/')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Get Yarn cache dir
        id: yarn-cache
        shell: bash
        run: echo "dir=$(yarn cache dir)" >> "$GITHUB_OUTPUT"

      - uses: actions/cache@v4
        with:
          path: ${{ steps.yarn-cache.outputs.dir }}
          key: ${{ runner.os }}-yarn-${{ hashFiles('yarn.lock') }}
          restore-keys: ${{ runner.os }}-yarn-

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Build core (anydrop.dll)
        run: cargo build -p anydrop --release

      - name: Build Tauri Windows installer
        run: yarn workspace @anydrop/desktop-tauri tauri build --bundles nsis

      - uses: actions/upload-artifact@v4
        with:
          name: anydrop-dll
          path: target/release/anydrop.dll

      - uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: target/release/bundle/nsis/*.exe

  # ── macOS ──────────────────────────────────────────────────────────────────
  build-macos:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Get Yarn cache dir
        id: yarn-cache
        run: echo "dir=$(yarn cache dir)" >> "$GITHUB_OUTPUT"

      - uses: actions/cache@v4
        with:
          path: ${{ steps.yarn-cache.outputs.dir }}
          key: ${{ runner.os }}-yarn-${{ hashFiles('yarn.lock') }}
          restore-keys: ${{ runner.os }}-yarn-

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      # Resolve the chosen architecture. Push events have no input → fall back
      # to "universal".  `target` is the full rustc/Tauri triple; `slug` is the
      # short tag we use to namespace artifacts.
      - name: Resolve macOS target
        id: target
        shell: bash
        run: |
          INPUT="${{ github.event.inputs.macos_target }}"
          case "${INPUT:-universal}" in
            aarch64)
              echo "triple=aarch64-apple-darwin" >> "$GITHUB_OUTPUT"
              echo "slug=aarch64"                >> "$GITHUB_OUTPUT"
              ;;
            x86_64)
              echo "triple=x86_64-apple-darwin"  >> "$GITHUB_OUTPUT"
              echo "slug=x86_64"                 >> "$GITHUB_OUTPUT"
              ;;
            *)
              echo "triple=universal-apple-darwin" >> "$GITHUB_OUTPUT"
              echo "slug=universal"                >> "$GITHUB_OUTPUT"
              ;;
          esac

      - name: Add Rust targets
        run: rustup target add aarch64-apple-darwin x86_64-apple-darwin

      # For universal, build the standalone dylib twice and lipo-merge. For
      # an arch-specific build, one cargo invocation does the job.
      - name: Build core (libanydrop.dylib)
        shell: bash
        run: |
          TRIPLE="${{ steps.target.outputs.triple }}"
          if [ "$TRIPLE" = "universal-apple-darwin" ]; then
            cargo build -p anydrop --release --target aarch64-apple-darwin
            cargo build -p anydrop --release --target x86_64-apple-darwin
            mkdir -p target/universal-apple-darwin/release
            lipo -create -output target/universal-apple-darwin/release/libanydrop.dylib \
              target/aarch64-apple-darwin/release/libanydrop.dylib \
              target/x86_64-apple-darwin/release/libanydrop.dylib
          else
            cargo build -p anydrop --release --target "$TRIPLE"
          fi

      - name: Build Tauri macOS app
        run: yarn workspace @anydrop/desktop-tauri tauri build --target ${{ steps.target.outputs.triple }} --bundles app,dmg

      - uses: actions/upload-artifact@v4
        with:
          name: libanydrop-dylib-${{ steps.target.outputs.slug }}
          path: target/${{ steps.target.outputs.triple }}/release/libanydrop.dylib

      - name: Zip .app bundle
        run: |
          cd target/${{ steps.target.outputs.triple }}/release/bundle/macos
          zip -r AnyDrop-${{ steps.target.outputs.slug }}.app.zip AnyDrop.app

      - uses: actions/upload-artifact@v4
        with:
          name: macos-app-${{ steps.target.outputs.slug }}
          path: |
            target/${{ steps.target.outputs.triple }}/release/bundle/macos/AnyDrop-${{ steps.target.outputs.slug }}.app.zip
            target/${{ steps.target.outputs.triple }}/release/bundle/dmg/*.dmg

  # ── Release candidate ──────────────────────────────────────────────────────
  # Only push events (which always produce a universal macOS build) and manual
  # dispatches that explicitly chose `universal` create a public RC.  Manual
  # arch-specific builds remain as workflow artifacts only — no release.
  release:
    needs: [build-windows, build-macos]
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'push' ||
      (github.event_name == 'workflow_dispatch' &&
       (github.event.inputs.macos_target == 'universal' ||
        github.event.inputs.macos_target == ''))

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: rc-v${{ needs.build-windows.outputs.version }}-${{ github.run_number }}
          name: "RC v${{ needs.build-windows.outputs.version }} #${{ github.run_number }}"
          prerelease: true
          generate_release_notes: true
          fail_on_unmatched_files: false
          files: |
            artifacts/anydrop-dll/anydrop.dll
            artifacts/libanydrop-dylib-universal/libanydrop.dylib
            artifacts/windows-installer/*.exe
            artifacts/macos-app-universal/**/AnyDrop-universal.app.zip
            artifacts/macos-app-universal/**/*.dmg
